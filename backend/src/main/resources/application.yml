server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: nova-studio-backend
  profiles:
    active: dev

  # Jackson
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

  # DataSource
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://175.24.189.29:16033/nova_studio?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: Zh@4152631
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000
      pool-name: NovaHikariPool

  # Redis
  data:
    redis:
      host: 175.24.189.29
      port: 13680
      database: 0
      password: leakeypass
      timeout: 10s
      lettuce:
        pool:
          min-idle: 5
          max-idle: 10
          max-active: 20
          max-wait: 5s

  # Security
  security:
    user:
      name: admin
      password: admin

# MyBatis Plus
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.novastudio.backend.*.infrastructure.persistence.entity
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      table-underline: true
    banner: false
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    call-setters-on-nulls: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT
jwt:
  secret: NovaStudioSecretKeyForJwtTokenGeneration2026NovaStudioSecretKeyForJwtTokenGeneration2026
  access-token-expiration: 900000      # 15 minutes
  refresh-token-expiration: 604800000   # 7 days
  issuer: nova-studio

# SpringDoc
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs

# Logging
logging:
  level:
    root: INFO
    com.novastudio.backend: DEBUG
    org.springframework.security: DEBUG
